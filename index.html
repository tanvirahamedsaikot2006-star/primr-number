<!DOCTYPE html>
<html>
<head>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #1a1a1a; color: white; text-align: center; font-family: sans-serif; padding: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn {
            background: #333; border: 1px solid #444; border-radius: 12px;
            padding: 20px; color: white; display: flex; flex-direction: column;
            align-items: center; gap: 10px; cursor: pointer;
        }
        /* মুভিং ইমোজি সাইজ */
        .btn img { width: 40px; height: 40px; }
    </style>
</head>
<body>
    <h3>Select an Action</h3>
    <div class="grid">
        <div class="btn" onclick="send('get_number')">
            <img src="https://fonts.gstatic.com/s/e/notoemoji/latest/1f4dd/512.webp"> Get Number
        </div>
        <div class="btn" onclick="send('account')">
            <img src="https://fonts.gstatic.com/s/e/notoemoji/latest/1f4b3/512.webp"> Account
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        function send(cmd) {
            tg.sendData(JSON.stringify(cmd));
            tg.close();
        }
    </script>
</body>
</html>
